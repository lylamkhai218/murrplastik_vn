<!DOCTYPE html><html lang="vi"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard — MURRPLASTIK VN Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Barlow',sans-serif;background:#f5f4f0;color:#1a1a1a}
:root{--red:#C8102E;--dark:#1a1a1a;--border:#e0ddd7;--white:#fff;--light:#f5f4f0}
nav{background:var(--dark);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;position:sticky;top:0;z-index:100}
.nav-logo{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:#fff;letter-spacing:1px}
.nav-logo span{color:var(--red)}
.nav-right{display:flex;align-items:center;gap:1rem}
.nav-user{color:rgba(255,255,255,0.5);font-size:12px}
.btn-logout{background:transparent;border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.6);padding:6px 14px;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all 0.2s}
.btn-logout:hover{border-color:var(--red);color:var(--red)}
.main{padding:2rem;max-width:1200px;margin:0 auto}
.page-title{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:700;margin-bottom:4px}
.page-sub{color:#6b6b6b;font-size:13px;margin-bottom:2rem}
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:2rem}
.scard{background:var(--white);border:1px solid var(--border);padding:1.2rem;text-align:center}
.scard-num{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:700;color:var(--red)}
.scard-label{font-size:11px;color:#6b6b6b;letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:12px}
.toolbar-left{display:flex;gap:8px;flex-wrap:wrap}
.btn-add{background:var(--red);color:#fff;padding:10px 20px;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border:none;cursor:pointer;transition:background 0.2s}
.btn-add:hover{background:#a50d25}
.btn-export{background:transparent;border:1px solid var(--border);color:#6b6b6b;padding:10px 16px;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn-export:hover{border-color:var(--dark);color:var(--dark)}
.filter-select{border:1px solid var(--border);padding:10px 12px;font-family:'Barlow',sans-serif;font-size:13px;background:var(--white);outline:none;cursor:pointer}
.table-wrap{background:var(--white);border:1px solid var(--border);overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{background:var(--dark);color:rgba(255,255,255,0.7);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:12px 16px;text-align:left;white-space:nowrap}
td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}
.badge{display:inline-block;padding:3px 8px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.badge-acs{background:rgba(200,16,46,0.1);color:var(--red)}
.badge-suv{background:rgba(59,130,246,0.1);color:#1d4ed8}
.badge-kdh{background:rgba(16,185,129,0.1);color:#065f46}
.badge-efk{background:rgba(245,158,11,0.1);color:#92400e}
.badge-aur{background:rgba(139,92,246,0.1);color:#5b21b6}
.btn-edit{background:transparent;border:1px solid var(--border);padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.2s;margin-right:4px}
.btn-edit:hover{border-color:var(--dark)}
.btn-del{background:transparent;border:1px solid rgba(200,16,46,0.2);color:var(--red);padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn-del:hover{background:var(--red);color:#fff}
/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;display:none;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--white);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;padding:2rem}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:transparent;border:none;font-size:20px;cursor:pointer;color:#6b6b6b}
.modal-close:hover{color:var(--dark)}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.fg label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#6b6b6b}
.fg input,.fg select,.fg textarea{border:1px solid var(--border);padding:10px 12px;font-family:'Barlow',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--red)}
.fg textarea{height:80px;resize:none}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border)}
.btn-save{background:var(--red);color:#fff;padding:10px 24px;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border:none;cursor:pointer}
.btn-cancel{background:transparent;border:1px solid var(--border);padding:10px 20px;font-size:12px;font-weight:600;cursor:pointer}
.empty{text-align:center;padding:3rem;color:#9a9a9a;font-size:14px}
@media(max-width:768px){.stats-row{grid-template-columns:repeat(3,1fr)}.main{padding:1rem}}
</style></head><body>
<nav>
<div class="nav-logo">MURR<span>PLASTIK</span> · ADMIN</div>
<div class="nav-right">
<span class="nav-user">👤 admin</span>
<button class="btn-logout" onclick="logout()">Đăng xuất</button>
</div>
</nav>
<div class="main">
<div class="page-title">Quản lý sản phẩm</div>
<p class="page-sub">Thêm, sửa, xóa sản phẩm hiển thị trên website murrplastikvn.com</p>
<div class="stats-row" id="statsRow"></div>
<div class="toolbar">
<div class="toolbar-left">
<button class="btn-add" onclick="openModal()">+ Thêm sản phẩm</button>
<select class="filter-select" id="filterCat" onchange="renderTable()">
<option value="">Tất cả danh mục</option>
<option value="ACS">ACS — Tem nhãn</option>
<option value="SUV">SUV — Ống dẫn</option>
<option value="KDH">KDH — Đầu vào cáp</option>
<option value="EFK">EFK — Máng xích</option>
<option value="AUR">AUR — Robot</option>
</select>
</div>
<button class="btn-export" onclick="exportJSON()">⬇ Xuất JSON</button>
</div>
<div class="table-wrap">
<table>
<thead><tr><th>#</th><th>Mã SP</th><th>Tên sản phẩm</th><th>Danh mục</th><th>Mô tả</th><th>Trạng thái</th><th>Thao tác</th></tr></thead>
<tbody id="tbody"></tbody>
</table>
</div>
</div>
<div class="overlay" id="overlay">
<div class="modal">
<div class="modal-title"><span id="modalTitle">Thêm sản phẩm</span><button class="modal-close" onclick="closeModal()">✕</button></div>
<div class="fg"><label>Mã sản phẩm *</label><input id="f-code" placeholder="Ví dụ: ACS-101"></div>
<div class="fg"><label>Tên sản phẩm *</label><input id="f-name" placeholder="Tên sản phẩm"></div>
<div class="fg"><label>Danh mục *</label>
<select id="f-cat">
<option value="ACS">ACS — Tem nhãn & Dán nhãn</option>
<option value="SUV">SUV — Ống dẫn & Phụ kiện</option>
<option value="KDH">KDH — Đầu vào cáp & Giá đỡ</option>
<option value="EFK">EFK — Máng xích nhựa</option>
<option value="AUR">AUR — Phụ kiện Robot</option>
</select></div>
<div class="fg"><label>Mô tả</label><textarea id="f-desc" placeholder="Mô tả ngắn về sản phẩm..."></textarea></div>
<div class="fg"><label>Giá tham khảo (VNĐ)</label><input id="f-price" type="text" placeholder="Liên hệ báo giá"></div>
<div class="fg"><label>URL hình ảnh</label><input id="f-img" placeholder="https://..."></div>
<div class="fg"><label>Trạng thái</label>
<select id="f-status"><option value="active">Đang bán</option><option value="inactive">Ngừng kinh doanh</option></select>
</div>
<div class="modal-footer">
<button class="btn-cancel" onclick="closeModal()">Hủy</button>
<button class="btn-save" onclick="saveProduct()">Lưu sản phẩm</button>
</div>
</div>
</div>
<script>
const CATS={ACS:'badge-acs',SUV:'badge-suv',KDH:'badge-kdh',EFK:'badge-efk',AUR:'badge-aur'};
let products=JSON.parse(localStorage.getItem('mp_products')||'[]');
let editId=null;

function save(){localStorage.setItem('mp_products',JSON.stringify(products));}

function renderStats(){
const r=document.getElementById('statsRow');
const cats=['ACS','SUV','KDH','EFK','AUR'];
let h=`<div class="scard"><div class="scard-num">${products.length}</div><div class="scard-label">Tổng SP</div></div>`;
cats.forEach(c=>{const n=products.filter(p=>p.cat===c).length;h+=`<div class="scard"><div class="scard-num">${n}</div><div class="scard-label">${c}</div></div>`;});
r.innerHTML=h;
}

function renderTable(){
const filter=document.getElementById('filterCat').value;
const list=filter?products.filter(p=>p.cat===filter):products;
const tb=document.getElementById('tbody');
if(!list.length){tb.innerHTML='<tr><td colspan="7" class="empty">Chưa có sản phẩm nào. Nhấn "+ Thêm sản phẩm" để bắt đầu.</td></tr>';return;}
tb.innerHTML=list.map((p,i)=>`<tr>
<td>${i+1}</td>
<td style="font-weight:700;font-size:12px">${p.code||'—'}</td>
<td style="font-weight:600;max-width:200px">${p.name}</td>
<td><span class="badge ${CATS[p.cat]||''}">${p.cat}</span></td>
<td style="color:#6b6b6b;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.desc||'—'}</td>
<td><span class="badge" style="${p.status==='active'?'background:rgba(16,185,129,0.1);color:#065f46':'background:rgba(107,107,107,0.1);color:#6b6b6b'}">${p.status==='active'?'Đang bán':'Ngừng'}</span></td>
<td><button class="btn-edit" onclick="editProduct('${p.id}')">Sửa</button><button class="btn-del" onclick="delProduct('${p.id}')">Xóa</button></td>
</tr>`).join('');
}

function openModal(id){
editId=id||null;
document.getElementById('modalTitle').textContent=id?'Sửa sản phẩm':'Thêm sản phẩm';
const p=id?products.find(x=>x.id===id):{};
document.getElementById('f-code').value=p.code||'';
document.getElementById('f-name').value=p.name||'';
document.getElementById('f-cat').value=p.cat||'ACS';
document.getElementById('f-desc').value=p.desc||'';
document.getElementById('f-price').value=p.price||'';
document.getElementById('f-img').value=p.img||'';
document.getElementById('f-status').value=p.status||'active';
document.getElementById('overlay').classList.add('open');
}

function closeModal(){document.getElementById('overlay').classList.remove('open');editId=null;}

function saveProduct(){
const name=document.getElementById('f-name').value.trim();
if(!name){alert('Vui lòng nhập tên sản phẩm!');return;}
const obj={id:editId||Date.now().toString(),code:document.getElementById('f-code').value.trim(),name,cat:document.getElementById('f-cat').value,desc:document.getElementById('f-desc').value.trim(),price:document.getElementById('f-price').value.trim(),img:document.getElementById('f-img').value.trim(),status:document.getElementById('f-status').value};
if(editId){const i=products.findIndex(p=>p.id===editId);products[i]=obj;}else{products.push(obj);}
save();renderTable();renderStats();closeModal();
}

function editProduct(id){openModal(id);}

function delProduct(id){
if(!confirm('Xóa sản phẩm này?'))return;
products=products.filter(p=>p.id!==id);
save();renderTable();renderStats();
}

function exportJSON(){
const blob=new Blob([JSON.stringify(products,null,2)],{type:'application/json'});
const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='products.json';a.click();
}

function logout(){localStorage.removeItem('mp_admin');location.href='index.html';}

// Auth check
if(localStorage.getItem('mp_admin')!=='1')location.href='index.html';

// Init with sample data if empty
if(!products.length){
products=[
{id:'1',code:'ACS-101',name:'Tem nhãn cáp nhiệt co',cat:'ACS',desc:'Tem nhãn nhiệt co dùng cho cáp và dây dẫn, chịu nhiệt đến 120°C',price:'Liên hệ',img:'',status:'active'},
{id:'2',code:'EFK-201',name:'Máng xích nhựa Series CF',cat:'EFK',desc:'Cable drag chain cho chuyển động liên tục, tải trọng cao',price:'Liên hệ',img:'',status:'active'},
{id:'3',code:'KDH-301',name:'Đầu vào cáp đơn SK',cat:'KDH',desc:'Cable entry cho tủ điện công nghiệp, IP54/IP65',price:'Liên hệ',img:'',status:'active'},
{id:'4',code:'SUV-401',name:'Ống luồn dây mềm PA',cat:'SUV',desc:'Corrugated conduit polyamide, chống cháy, đường kính 10-50mm',price:'Liên hệ',img:'',status:'active'},
{id:'5',code:'AUR-501',name:'Giải pháp quản lý cáp robot',cat:'AUR',desc:'Hệ thống dẫn hướng cáp cho cánh tay robot 6 bậc tự do',price:'Liên hệ',img:'',status:'active'}
];save();
}

document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
renderTable();renderStats();
</script>
</body></html>
